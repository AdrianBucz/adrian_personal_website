# This workflow builds a statically exported Next.js site and deploys it to GitHub Pages.
name: Deploy Next.js to GitHub Pages

on:
  # Run automatically whenever code is pushed to the default deployment branch.
  push:
    branches:
      - main
  # Allow manual deployment runs from the Actions tab.
  workflow_dispatch:

# Minimal permissions required for GitHub Pages artifact upload and deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid overlapping deployments; newer runs cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Build job: install dependencies, run static export build, and upload output.
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out repository source code.
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Install latest Node.js LTS and enable npm dependency caching.
      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # Step 3: Configure Pages environment metadata for this workflow run.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 4: Install exact dependencies from package-lock.json.
      - name: Install dependencies
        run: npm ci

      # Step 5: Build Next.js production output.
      # With output: "export", this generates static files in the out directory.
      - name: Build static site
        run: npm run build

      # Step 6: Prevent GitHub Pages from running Jekyll processing.
      # This is important for serving paths like _next correctly.
      - name: Ensure no Jekyll processing
        run: touch out/.nojekyll

      # Step 7: Upload the static output as the GitHub Pages deployment artifact.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  # Deploy job: publish the uploaded artifact to GitHub Pages.
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Step 8: Deploy the previously uploaded artifact to GitHub Pages.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
